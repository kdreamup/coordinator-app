<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      height:100%;
      font-family:Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      background:#f4f7fb;
      color:#1f2937;
    }
    body{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:20px;
    }
    .card{
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:24px;
      box-shadow:0 14px 40px rgba(15,23,42,.08);
      padding:48px 40px 40px;
      max-width:440px;width:100%;
      text-align:center;
    }
    .icon-wrap{
      width:80px;height:80px;border-radius:50%;
      background:#dbeafe;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 24px;
      font-size:36px;
    }
    .code{
      font-size:13px;font-weight:800;
      color:#2563eb;
      background:#eff6ff;
      border:1px solid #bfdbfe;
      border-radius:999px;
      padding:5px 14px;
      display:inline-block;
      margin-bottom:16px;
      letter-spacing:.06em;
    }
    h1{
      font-size:22px;font-weight:800;
      color:#1f2937;
      margin-bottom:10px;
      letter-spacing:-.02em;
    }
    p{
      font-size:14px;color:#64748b;
      line-height:1.7;margin-bottom:32px;
    }
    .btn-wrap{display:flex;flex-direction:column;gap:10px;}
    .btn{
      display:block;width:100%;
      padding:14px;border-radius:14px;
      font-size:15px;font-weight:800;
      text-decoration:none;
      cursor:pointer;border:none;
      transition:.15s ease;
    }
    .btn:active{transform:scale(.98);}
    .btn-primary{background:#2563eb;color:#fff;}
    .btn-primary:hover{background:#1d4ed8;}
    .btn-soft{
      background:#f8fafc;color:#334155;
      border:1px solid #e2e8f0;
    }
    .btn-soft:hover{background:#f1f5f9;}
    .footer{
      margin-top:28px;
      font-size:12px;color:#94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">🔍</div>
    <div class="code">404 NOT FOUND</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 주소가 잘못되었거나<br>이동·삭제된 페이지입니다.<br>주소를 다시 확인해 주세요.</p>
    <div class="btn-wrap">
      <a href="/" class="btn btn-primary">🏠 홈으로 돌아가기</a>
      <button class="btn btn-soft" onclick="history.back()">← 이전 페이지로</button>
    </div>
    <div class="footer">(사)한국노인의전화대전지회 관리 시스템</div>
  </div>
</body>
</html>
