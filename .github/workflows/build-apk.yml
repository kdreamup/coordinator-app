name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0

      - name: Init Capacitor
        run: |
          npx cap init "노인코디네이터" "kr.nonsan.coordinator" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Fix Gradle and SDK versions
        run: |
          cd android
          # Gradle 8.4로 업그레이드
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          # Android Gradle Plugin 8.1.4로 업그레이드
          sed -i "s|classpath 'com.android.tools.build:gradle:8.0.0'|classpath 'com.android.tools.build:gradle:8.1.4'|g" build.gradle
          # variables.gradle에서 compileSdk와 targetSdk를 35로 설정
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' variables.gradle

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
