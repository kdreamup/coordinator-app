name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0

      - name: Init Capacitor
        run: |
          npx cap init "노인코디네이터" "kr.nonsan.coordinator" --web-dir www

      - name: Add Android platform
        run: npx cap add android

- name: Fix Gradle and SDK versions
        run: |
          cd android
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          sed -i "s|classpath 'com.android.tools.build:gradle:8.0.0'|classpath 'com.android.tools.build:gradle:8.1.4'|g" build.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' variables.gradle
          # versionCode를 app/build.gradle에서 직접 수정
          sed -i 's/versionCode 1/versionCode 2/' app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.1"/' app/build.gradle
          echo "=== app/build.gradle versionCode 확인 ==="
          grep -n "versionCode\|versionName" app/build.gradle

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/coordinator.keystore

      - name: Configure Signing
        run: |
          cd android/app
          cat >> build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("coordinator.keystore")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD }}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
