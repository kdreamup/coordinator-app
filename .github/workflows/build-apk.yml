name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0

      - name: Init Capacitor
        run: |
          npx cap init "Coordinator App" "kr.nonsan.coordinator" --web-dir www

      - name: Add Android platform
        run: |
          npx cap add android

      - name: Add Android location permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path("android/app/src/main/AndroidManifest.xml")
          text = path.read_text(encoding="utf-8")
          permissions = [
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />'
          ]
          if "android.permission.ACCESS_FINE_LOCATION" not in text:
              insert = "\n".join("    " + item for item in permissions)
              text = re.sub(r"(<manifest[^>]*>)", r"\1\n" + insert, text, count=1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Fix Gradle SDK and app version
        run: |
          cd android
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
          grep -q '^networkTimeout=' gradle/wrapper/gradle-wrapper.properties && sed -i 's/networkTimeout=.*/networkTimeout=600000/' gradle/wrapper/gradle-wrapper.properties || echo 'networkTimeout=600000' >> gradle/wrapper/gradle-wrapper.properties
          sed -i "s|classpath 'com.android.tools.build:gradle:8.0.0'|classpath 'com.android.tools.build:gradle:8.1.4'|g" build.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' variables.gradle
          sed -i -E 's/versionCode [0-9]+/versionCode 46/' app/build.gradle
          sed -i -E 's/versionName "[^"]*"/versionName "5.6"/' app/build.gradle
          echo "Android app version"
          grep -n "versionCode\|versionName" app/build.gradle

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/coordinator.keystore

      - name: Configure Signing
        run: |
          cd android/app
          cat >> build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("coordinator.keystore")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD }}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
