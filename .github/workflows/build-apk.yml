name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0

      - name: Init Capacitor
        run: |
          npx cap init "노인코디네이터" "kr.nonsan.coordinator" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Apply app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          pip install Pillow --break-system-packages -q
          python3 -c "
          from PIL import Image
          img = Image.open('app_icon.png').convert('RGBA')
          sizes = {
            'mipmap-xxxhdpi': 192,
            'mipmap-xxhdpi': 144,
            'mipmap-xhdpi': 96,
            'mipmap-hdpi': 72,
            'mipmap-mdpi': 48,
          }
          for folder, size in sizes.items():
            resized = img.resize((size, size), Image.LANCZOS)
            resized.save(f'android/app/src/main/res/{folder}/ic_launcher.png')
            resized.save(f'android/app/src/main/res/{folder}/ic_launcher_round.png')
          print('아이콘 적용 완료')
          "

      - name: Fix Gradle wrapper version
        run: |
          cd android
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-all.zip|g' gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
